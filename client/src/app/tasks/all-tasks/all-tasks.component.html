<h3>All Tasks</h3>
<div class="task-container" *ngIf="tasks.length > 0">
    <div class="task-card" *ngFor="let task of tasks">
        <div class="task-image">
            <img src="{{task.imageUrl}}" alt="Task Image">
        </div>
        <div class="task-details">
            <h3 class="task-title">{{task.title}}</h3>
            <p><strong>Description:</strong> {{task.description}}</p> 
            <p><strong>Due Date:</strong> {{task.dueDate | date}}</p> <!-- Change CLASS -->
            <a routerLink="/all-tasks/{{task._id}}" class="btn">View Details</a>
        </div>
    </div>
</div>

<div class="no-tasks-found-container" *ngIf="!tasks.length">
    <div class="no-tasks-found">
        No tasks found...
    </div>
</div>
